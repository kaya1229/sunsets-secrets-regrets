<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강철삼림: 언더커버 추출 작전</title>
    <style>
        :root {
            --bg-dark: #050a0f;
            --panel-bg: #0d151d;
            --accent-blue: #00e5ff;
            --danger-red: #ff3e3e;
            --signal-green: #00ff88;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CCTV 스캔라인 */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        #game-container {
            width: 360px; /* 고정폭으로 설정하여 레이아웃 붕괴 방지 */
            background: var(--panel-bg);
            border: 1px solid #2a3b4d;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            position: relative;
            z-index: 5;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            border-bottom: 1px solid #2a3b4d;
            padding-bottom: 10px;
            font-size: 0.8rem;
        }

        .status-panel { text-align: center; flex-grow: 1; }
        .timer-text { font-size: 1.2rem; color: var(--accent-blue); font-weight: bold; margin-top: 5px; }

        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .tile {
            aspect-ratio: 1;
            background: #16222c;
            border: 1px solid #253341;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.6s ease-out;
        }

        .tile:hover { background: #1f2f3d; }
        .tile.open { background: #050a0f; cursor: default; border-color: #0d151d; }
        
        /* 힌트 컬러 */
        .hint-red { color: var(--danger-red); text-shadow: 0 0 8px var(--danger-red); }
        .hint-orange { color: #ffab40; }
        .hint-blue { color: var(--accent-blue); }
        .hint-none { color: #333 !important; text-shadow: none !important; }

        .system-log {
            background: #000;
            padding: 10px;
            font-size: 0.75rem;
            color: var(--signal-green);
            height: 45px;
            border: 1px solid #1a1a1a;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div>AGENT<br><span style="color:var(--accent-blue)">ZHOU JIN</span></div>
        <div class="status-panel">
            <div style="font-size: 0.7rem; color: #666;">OPERATION: UNDERCOVER</div>
            <div class="timer-text" id="status-display">DECODING...</div>
        </div>
        <div style="text-align:right">TARGET<br><span style="color:var(--danger-red)">JANG CHENG</span></div>
    </header>

    <div id="grid"></div>

    <div class="system-log" id="log-display">
        [SYSTEM] 장청의 신호 반경을 추적 중입니다. 타일을 열어 위치를 특정하십시오.
    </div>
</div>

<script>
    const ROWS = 10;
    const COLS = 8;
    const MINES_COUNT = 12;
    const HINT_TIME = 4000; 

    let grid = [];
    let opened = [];
    let flagged = [];
    let targetPos = { r: 0, c: 0 };

    const gridEl = document.getElementById('grid');
    const logEl = document.getElementById('log-display');

    function startGame() {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        opened = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        flagged = Array.from({ length: ROWS }, () => Array(COLS).fill(false));

        // 장청 & 조직원 배치
        let targetSet = false;
        let minesSet = 0;
        while (!targetSet || minesSet < MINES_COUNT - 1) {
            let r = Math.floor(Math.random() * ROWS);
            let c = Math.floor(Math.random() * COLS);
            if (grid[r][c] === 0) {
                if (!targetSet) {
                    targetPos = { r, c };
                    grid[r][c] = 'T';
                    targetSet = true;
                } else {
                    grid[r][c] = 'M';
                    minesSet++;
                }
            }
        }

        // 인접 지뢰 계산
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] === 'M' || grid[r][c] === 'T') continue;
                let count = 0;
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        let nr = r + i, nc = c + j;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            if (grid[nr][nc] === 'M' || grid[nr][nc] === 'T') count++;
                        }
                    }
                }
                grid[r][c] = count;
            }
        }
        drawGrid();
    }

    function drawGrid() {
        gridEl.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const div = document.createElement('div');
                div.className = 'tile';
                div.id = `t-${r}-${c}`;
                div.onclick = () => handleClick(r, c);
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    handleRightClick(r, c);
                };
                gridEl.appendChild(div);
            }
        }
    }

    function handleClick(r, c) {
        if (opened[r][c] || flagged[r][c]) return;

        if (grid[r][c] === 'T') {
            logEl.innerText = "[SUCCESS] 장청 구출 성공. 통신망을 폐쇄합니다.";
            setTimeout(() => { alert("Mission Clear"); location.reload(); }, 200);
        } else if (grid[r][c] === 'M') {
            logEl.innerText = "[WARNING] 조직원에게 발각됨. 작전 즉시 중단.";
            setTimeout(() => { alert("Mission Failed"); location.reload(); }, 200);
        } else {
            processReveal(r, c);
        }
    }

    function processReveal(r, c) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS || opened[r][c] || flagged[r][c]) return;

        opened[r][c] = true;
        const el = document.getElementById(`t-${r}-${c}`);
        el.classList.add('open');

        if (grid[r][c] > 0) el.innerText = grid[r][c];

        // 힌트 컬러 적용
        const dist = Math.sqrt(Math.pow(r - targetPos.r, 2) + Math.pow(c - targetPos.c, 2));
        let colorClass = 'hint-blue';
        if (dist <= 2.2) colorClass = 'hint-red';
        else if (dist <= 4.2) colorClass = 'hint-orange';
        
        el.classList.add(colorClass);

        // 타이머 설정
        setTimeout(() => {
            el.classList.remove('hint-red', 'hint-orange', 'hint-blue');
            el.classList.add('hint-none');
        }, HINT_TIME);

        // 주변 0일 때 자동 확장
        if (grid[r][c] === 0) {
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    processReveal(r + i, c + j);
                }
            }
        }
    }

    function handleRightClick(r, c) {
        if (opened[r][c]) return;
        flagged[r][c] = !flagged[r][c];
        const el = document.getElementById(`t-${r}-${c}`);
        el.innerText = flagged[r][c] ? "🚩" : "";
    }

    startGame();
</script>
</body>
</html>
