<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강철삼림: CCTV 모니터링 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1013;
            --monitor-border: #4d4d4d;
            --hack-green: #3fff42; 
            --accent-blue: #00e5ff;
            --danger-red: #ff3e3e;
            --signal-green: #00ff88;
            --hint-red: #ff3030;
            --hint-orange: #ffab40;
            --hint-blue: #40c4ff;
            --font-main: 'Nanum Gothic Coding', monospace;
            --font-title: 'Orbitron', sans-serif;
            --texture-iron: url('https://www.transparenttextures.com/patterns/dark-iron.png');
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: var(--font-main);
            overflow: hidden; color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
        }

        #login-screen {
            width: 500px; text-align: center; display: flex; flex-direction: column; align-items: center;
        }
        #intro-image {
    width: 300px; 
    cursor: pointer; 
    transition: all 0.5s ease-in-out;
    opacity: 0.7; 
    
    /* [핵심] 흰 선 연출 필터 */
    filter: 
        grayscale(100%) 
        /* 원본이 어둡다면 반전시켜 선을 하얗게 만듦 */
        invert(100%) 
        brightness(1.5)
        /* 흰색 광채 */
        drop-shadow(0 0 8px rgba(255,255,255,0.8));
}

#intro-image:hover { 
    transform: scale(1.05); 
    opacity: 1; 
    /* 호버 시 약간 푸른빛이 도는 흰색으로 변경 */
    filter: 
        grayscale(100%) invert(100%) brightness(2)
        drop-shadow(0 0 15px #fff) drop-shadow(0 0 5px var(--accent-blue));
}
        
        #access-codes {
            display: none; color: var(--accent-blue); font-size: 0.9rem; margin: 20px 0;
            line-height: 1.6; text-shadow: 0 0 5px var(--accent-blue);
        }

        #login-input-area { margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #pass-input { 
            background: transparent; border: none; color: #fff; outline: none; 
            font-family: var(--font-main); font-size: 1.1rem; text-align: center;
        }
        #terminal-footer { margin-top: 30px; font-size: 0.7rem; color: #444; font-family: var(--font-title); }

        #game-container {
            display: none; width: 95vw; height: 90vh; max-width: 1200px;
            background-color: var(--bg-dark); background-image: var(--texture-iron);
            border: 15px solid #333; grid-template-columns: 1fr 350px; grid-template-rows: 1fr 1fr;
            gap: 15px; padding: 20px; box-shadow: inset 0 0 50px #000;
        }

        .cctv-cell { background: #000; border: 1px solid #222; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .cctv-label { position: absolute; top: 8px; left: 10px; font-size: 0.7rem; color: #555; font-family: var(--font-title); z-index: 10; }

        #main-game-channel { grid-row: 1 / 3; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #global-timer { position: absolute; top: 10px; right: 20px; font-family: var(--font-title); color: var(--signal-green); font-size: 1.8rem; text-shadow: 0 0 10px var(--signal-green); }
        
        /* 그리드 영역 확장 */
        #grid { 
            display: grid; 
            gap: 4px; 
            width: 100%; 
            max-width: 750px; 
            margin-top: 30px;
        }

        #image-feed-channel { grid-column: 2; grid-row: 1; justify-content: center; align-items: center; }
        #status-image { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: grayscale(100%) contrast(120%) brightness(80%) sepia(20%) hue-rotate(150deg);
            opacity: 0.6;
        }

        #log-channel { grid-column: 2; grid-row: 2; padding: 40px 15px 15px; }
        #info-panel { border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; font-size: 0.85rem; }
        /* 1. 로그 디스플레이 영역의 스크롤바 숨기기 */
#log-display {
    flex-grow: 1;
    font-size: 0.85rem;
    color: var(--hack-green);
    overflow-y: auto;       /* 스크롤 기능은 유지 */
    line-height: 1.8;
    
    /* 스크롤바 숨기기 로직 */
    -ms-overflow-style: none;  /* IE 및 엣지 */
    scrollbar-width: none;     /* 파이어폭스 */
}

/* 2. 크롬, 사파리, 최신 엣지용 스크롤바 숨기기 */
#log-display::-webkit-scrollbar {
    display: none;             /* 스크롤바가 보이지 않게 처리 */
}

        .tile { 
            aspect-ratio: 1; background: #161a1f; border: 1px solid #252a30; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
            font-size: 0.9rem; font-family: var(--font-title); transition: 0.1s;
        }
        .tile.open { background: #000; border-color: #111; }
        .tile.open[data-dist="red"] { color: var(--hint-red); text-shadow: 0 0 8px var(--hint-red); }
        .tile.open[data-dist="orange"] { color: var(--hint-orange); text-shadow: 0 0 8px var(--hint-orange); }
        .tile.open[data-dist="blue"] { color: var(--hint-blue); text-shadow: 0 0 8px var(--hint-blue); }
        .tile.fade { color: #222 !important; text-shadow: none !important; }

        #result-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <img src="steel-forest-logo.png" id="intro-image" alt="강철삼림" onclick="showCodes()">
    <div id="access-codes">
        승인된 접속 코드:<br>
        [ 저우진 ] - EASY MODE<br>
        [ 장한성 ] - NORMAL MODE<br>
    </div>
    <div id="login-input-area">
        <input type="text" id="pass-input" placeholder="ACCESS CODE" autocomplete="off">
    </div>
   <div id="terminal-footer" onclick="unlockHiddenPath()" style="cursor: pointer; margin-top: 30px; color: #ffffff; opacity: 0.8;">made by deokjilkkk</div>
</div>

<div id="game-container">
    <div id="main-game-channel" class="cctv-cell">
        <div class="cctv-label">CH 05 - TARGET AREA (LIVE)</div>
        <div id="global-timer">00:00</div>
        <div id="grid"></div>
    </div>

    <div id="image-feed-channel" class="cctv-cell">
        <div class="cctv-label">CH 08 - IMAGE FEED</div>
        <img id="status-image" src="idle.jpeg">
    </div>

    <div id="log-channel" class="cctv-cell">
        <div class="cctv-label">CH 09 - SYSTEM LOG</div>
        <div id="info-panel">
            <div id="agent-display" style="color:var(--accent-blue)">AGENT: ---</div>
            <div id="goal-display" style="color:var(--danger-red); margin-top:5px;">GOAL: J.C (CONFIDENTIAL)</div>
        </div>
        <div id="log-display"></div>
    </div>
</div>

<div id="result-screen">
    <h1 id="result-title" style="font-family:var(--font-title); font-size: 3rem; letter-spacing: 15px;">STATUS</h1>
    <p id="result-msg" style="color:#ccc; margin: 20px 0; text-align: center;"></p>
    <button onclick="location.reload()" style="background:transparent; border:1px solid #fff; color:#fff; padding:10px 40px; cursor:pointer;">RE-ATTEMPT</button>
</div>

<script>
    // 확장된 그리드 규격 (12행 15열)
    const ROWS = 12, COLS = 15, MINES = 12;
    let grid = [], opened = [], targetPos = { r: 0, c: 0 };
    let gameActive = false, totalSeconds = 0, hintDuration = 3000, mainTimer, currentMode = "";
    let floodLimit = 2; // <--- 추가: 한 번에 확산될 최대 단계(깊이)
    let isHiddenPathUnlocked = false; 
    // [수정] 각 상태별로 여러 개의 이미지를 배열로 등록
const IMG_PATH = "./"; 
const IMAGES = {
    safe: ["a-1.gif", "a-2.gif", "a-3.gif","a-4.gif"],   // 예: 안전 구역 이미지 3개
    warn: ["b-1.gif", "b-2.gif","b-3.gif","b-4.gif","b-5.gif","b-6.gif","b-7.gif"],             // 예: 경고 구역 이미지 2개
    mine: ["c-1.gif","c-2.gif","c-3.gif","c-4.gif","c-5.gif","c-6.gif","c-7.gif","c-8.gif","c-9.gif"],                          // 지뢰는 기존대로
    target: ["d.gif"],                        // 타겟도 기존대로
    idle: "idle.png"                          // 초기 화면
};

    // 1. 하단 푸터 클릭 시 로고를 boss.jpeg로 변경
function unlockHiddenPath() {
    isHiddenPathUnlocked = true;
    const logo = document.getElementById('intro-image');
    
    // 로고 이미지를 boss.jpeg로 변경
    logo.src = "boss.jpeg"; 
    
    // 시각적 효과 (강렬한 붉은 광채)
    logo.style.filter = "drop-shadow(0 0 20px var(--danger-red)) brightness(1.2)";
    
    addLogEntry("경고: 비인가 경로를 통한 데이터 오버라이드 감지.");
}

// 2. 로고 클릭 시 실행 (isHiddenPathUnlocked 상태에 따라 텍스트 변경)
function showCodes() {
    const codesArea = document.getElementById('access-codes');
    const introImg = document.getElementById('intro-image');
    
    introImg.style.display = 'none';
    codesArea.style.display = 'block';

    if (isHiddenPathUnlocked) {
        // 푸터를 누른 뒤 로고를 눌렀을 때 (치옌 포함)
        codesArea.innerHTML = `
            승인된 접속 코드 (보안 등급: CRITICAL):<br>
            [ 저우진 ] - EASY MODE<br>
            [ 장한성 ] - NORMAL MODE<br>
            <span style="color:var(--danger-red); text-shadow: 0 0 10px var(--danger-red); font-weight:bold;">
                [ 치옌 ] - BOSS MODE (UNLOCKED)
            </span>
        `;
    } else {
        // 그냥 로고를 눌렀을 때
        codesArea.innerHTML = `
            승인된 접속 코드:<br>
            [ 저우진 ] - EASY MODE<br>
            [ 장한성 ] - NORMAL MODE
        `;
    }

    document.getElementById('pass-input').focus();
}

    document.getElementById('pass-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.toUpperCase();
            if (val === '저우진') proceedLogin("저우진", 180, 5000, "EASY");
            else if (val === '장한성') proceedLogin("장한성", 120, 3000, "NORMAL");
            else if (val === '치옌') proceedLogin("치옌", 120, 1500, "BOSS");
        }
    });

    function proceedLogin(name, time, hTime, mode) {
        gameActive = true; totalSeconds = time; hintDuration = hTime; currentMode = mode;
        if (mode === "EASY") floodLimit = 3;
    else if (mode === "NORMAL") floodLimit = 2;
    else if (mode === "BOSS") floodLimit = 2;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'grid';
        document.getElementById('agent-display').innerText = `AGENT: ${name}`;
        
        // 그리드 컬럼 수 동적 적용
        const gridEl = document.getElementById('grid');
        gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
        
        setupBoard();
        startTimer();
        addLogEntry(`시스템 온라인. ${mode} 모드 프로토콜 가동.`);
    }

    function setupBoard() {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        opened = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        let tSet = false, mSet = 0;
        
        while (!tSet || mSet < MINES) {
            let r = Math.floor(Math.random()*ROWS), c = Math.floor(Math.random()*COLS);
            if (grid[r][c] === 0) {
                if (!tSet) { targetPos = {r, c}; grid[r][c] = 'T'; tSet = true; }
                else { grid[r][c] = 'M'; mSet++; }
            }
        }

        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if (grid[r][c] === 'M' || grid[r][c] === 'T') continue;
                let count = 0;
                for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) {
                    let nr = r+i, nc = c+j;
                    if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && (grid[nr][nc]==='M'||grid[nr][nc]==='T')) count++;
                }
                grid[r][c] = count;
            }
        }

        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
            const div = document.createElement('div');
            div.className = 'tile'; div.id = `t-${r}-${c}`;
            div.onclick = () => handleClick(r, c);
            gridEl.appendChild(div);
        }
    }

    async function handleClick(r, c) {
        if (!gameActive || opened[r][c]) return;
        
        const cell = grid[r][c];

        if (cell === 'T') {
            updateImageFeed('target');
            if (currentMode === "BOSS") {
                gameActive = false;
                showResult(false, "MISSION FAILED", "장청에게 정체가 발각되었습니다.");
                revealAll();
            } else {
                addLogEntry("신호 감지: 타겟 장청 확인.");
                reveal(r, c, "⚠️");
            }
        } 
        else if (cell === 'M') {
            updateImageFeed('mine');
            if (currentMode === "BOSS") {
                addLogEntry("위협 요소(조직원) 제거 완료.");
                reveal(r, c, "✅");
            } else {
                gameActive = false;
                showResult(false, "ELIMINATED", "조직원에게 위치가 노출되었습니다. 추적 중단.");
                revealAll();
            }
        } 
        else {
            cell === 0 ? updateImageFeed('safe') : updateImageFeed('warn');
            addLogEntry(cell === 0 ? "구역 스캔: 안전." : "구역 스캔: 인근 신호 감지.");
            reveal(r, c);
        }
        checkWin();
    }

    // limit 파라미터 추가 (기본값은 floodLimit)
function reveal(r, c, icon = null, limit = floodLimit) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS || opened[r][c]) return;
    
    opened[r][c] = true;
    const el = document.getElementById(`t-${r}-${c}`);
    el.classList.add('open');
    
    const dist = Math.sqrt(Math.pow(r - targetPos.r, 2) + Math.pow(c - targetPos.c, 2));
    el.setAttribute('data-dist', dist <= 3 ? 'red' : (dist <= 6 ? 'orange' : 'blue'));

    if (icon) {
        el.innerText = icon;
    } else if (grid[r][c] > 0) {
        el.innerText = grid[r][c];
        setTimeout(() => { if(el.classList.contains('open')) el.classList.add('fade'); }, hintDuration);
    }

    // [수정된 부분] limit가 0보다 클 때만 주변 칸을 탐색함
    if (grid[r][c] === 0 && limit > 0) {
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                if (i === 0 && j === 0) continue;
                // 다음 칸을 열 때 limit를 1 감소시켜서 전달
                reveal(r + i, c + j, null, limit - 1);
            }
        }
    }
}

    function revealAll() {
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if (!opened[r][c]) {
                    const el = document.getElementById(`t-${r}-${c}`);
                    el.classList.add('open');
                    if (grid[r][c] === 'T') el.innerText = "⚠️";
                    else if (grid[r][c] === 'M') el.innerText = "×";
                    else if (grid[r][c] > 0) el.innerText = grid[r][c];
                }
            }
        }
    }

    function checkWin() {
        let safeLeft = 0, minesLeft = 0, foundT = opened[targetPos.r][targetPos.c];
        for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
            if (typeof grid[r][c] === 'number' && !opened[r][c]) safeLeft++;
            if (grid[r][c] === 'M' && !opened[r][c]) minesLeft++;
        }

        if (currentMode === "BOSS") {
            // 보스 모드: 장청 빼고 전부(안전지대+지뢰) 오픈 시 승리
            if (safeLeft === 0 && minesLeft === 0) {
                showResult(true, "MISSION COMPLETE", "구역 정화 완료 및 타겟 확보 성공.");
            }
        } else {
            // 일반 모드: 장청 찾고 안전지대 모두 오픈 시 승리
            if (foundT && safeLeft === 0) {
                showResult(true, "MISSION COMPLETE", "장청 확보 및 구역 제어 성공.");
            }
        }
    }

    function startTimer() {
        mainTimer = setInterval(() => {
            totalSeconds--;
            const m = Math.floor(totalSeconds/60), s = totalSeconds%60;
            document.getElementById('global-timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (totalSeconds <= 0) {
                gameActive = false;
                showResult(false, "SIGNAL LOST", "데이터 추적 시간 초과. 연결이 끊겼습니다.");
                revealAll();
            }
        }, 1000);
    }

    function addLogEntry(msg) {
        const logEl = document.getElementById('log-display');
        const entry = document.createElement('div');
        entry.innerText = `▶ ${msg}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function updateImageFeed(type) {
    const targetImg = IMAGES[type];
    const imgElement = document.getElementById('status-image');

    if (Array.isArray(targetImg)) {
        // 배열일 경우: 랜덤하게 하나 선택
        const randomIndex = Math.floor(Math.random() * targetImg.length);
        imgElement.src = IMG_PATH + targetImg[randomIndex];
    } else {
        // 단일 파일일 경우 (idle 등)
        imgElement.src = IMG_PATH + targetImg;
    }
}

    function showResult(isSuccess, title, msg) {
        gameActive = false;
        clearInterval(mainTimer);
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-title').style.color = isSuccess ? "var(--signal-green)" : "var(--danger-red)";
        document.getElementById('result-msg').innerText = msg;
    }
</script>
</body>
</html>
