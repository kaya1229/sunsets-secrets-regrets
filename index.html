<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강철삼림: 언더커버 추출 작전</title>
    <style>
        :root {
            --bg-dark: #050a0f;
            --panel-bg: #0d151d;
            --accent-blue: #00e5ff;
            --danger-red: #ff3e3e;
            --signal-green: #00ff88;
            --border-color: #2a3b4d;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); font-family: 'Courier New', monospace;
            overflow: hidden; color: #e0e0e0;
        }

        /* CCTV 스캔라인 효과 */
        body::after {
            content: " ";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none; z-index: 200; opacity: 0.6;
        }

        /* [스캔 레이어] */
        #scan-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100;
            --mask-x: -100%; --mask-y: -100%;
            mask-image: radial-gradient(circle 120px at var(--mask-x) var(--mask-y), black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle 120px at var(--mask-x) var(--mask-y), black 20%, transparent 100%);
        }

        .hidden-hint { position: absolute; color: #111; font-size: 0.8rem; letter-spacing: 2px; z-index: 50; user-select: none; transition: color 0.4s; }
        .scanned { color: var(--accent-blue) !important; text-shadow: 0 0 8px var(--accent-blue); }

        #login-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 110; width: 300px; }
        #login-screen input { background: #000; border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 15px; text-align: center; outline: none; width: 100%; font-family: inherit; }

        /* [게임 본체] */
        #game-container { display: none; width: 380px; background: var(--panel-bg); border: 1px solid var(--border-color); padding: 25px; position: relative; z-index: 5; margin: auto; margin-top: 8vh; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .timer-val { font-size: 1.6rem; color: var(--signal-green); font-weight: bold; }

        #grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
        .tile { aspect-ratio: 1; background: #16222c; border: 1px solid #253341; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .tile.open { background: var(--bg-dark); cursor: default; }

        /* 힌트 컬러 */
        .hint-red { color: var(--danger-red); text-shadow: 0 0 10px var(--danger-red); }
        .hint-orange { color: #ffab40; }
        .hint-blue { color: var(--accent-blue); }
        .hint-none { color: #333 !important; }

        /* [결과 오버레이] */
        #result-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 15, 0.95); z-index: 300;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }
        #result-title { font-size: 2rem; letter-spacing: 5px; margin-bottom: 20px; }
        #result-msg { font-size: 1rem; color: #888; margin-bottom: 40px; line-height: 1.6; }
        .retry-btn {
            background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue);
            padding: 15px 40px; cursor: pointer; font-family: inherit; letter-spacing: 2px;
            transition: all 0.3s;
        }
        .retry-btn:hover { background: var(--accent-blue); color: black; }

        .success { color: var(--signal-green); text-shadow: 0 0 20px var(--signal-green); }
        .failure { color: var(--danger-red); text-shadow: 0 0 20px var(--danger-red); }

        .timer-red { color: var(--danger-red) !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="scan-overlay"></div>
<div id="hint-container">
    <div class="hidden-hint" style="top:25%; left:15%">ZHOU12 (EASY)</div>
    <div class="hidden-hint" style="top:70%; left:70%">BRAIN9 (NORMAL)</div>
    <div class="hidden-hint" style="top:10%; left:75%">BOSS00 (HARD)</div>
</div>

<div id="login-screen">
    <h2 style="color:var(--accent-blue)">SYSTEM LOGIN</h2>
    <input type="text" id="pass-input" placeholder="INPUT AUTH CODE" autocomplete="off">
</div>

<div id="game-container">
    <header>
        <div class="profile-box">
            <span style="color:#556a7d; font-size:0.6rem">AGENT</span><br>
            <span id="agent-name" style="color:var(--accent-blue)">---</span>
        </div>
        <div style="text-align:center">
            <span style="color:#556a7d; font-size:0.6rem">SIG. TRACE</span>
            <div id="global-timer" class="timer-val">00:00</div>
        </div>
        <div class="profile-box" style="text-align:right">
            <span style="color:#556a7d; font-size:0.6rem">OBJECTIVE</span><br>
            <span id="target-goal" style="color:var(--danger-red)">JANG CHENG</span>
        </div>
    </header>
    <div id="grid"></div>
</div>

<div id="result-screen">
    <h1 id="result-title">MISSION STATUS</h1>
    <p id="result-msg"></p>
    <button class="retry-btn" onclick="location.reload()">RTX START (다시 시작)</button>
</div>

<script>
    const ROWS = 10, COLS = 8, MINES = 12;
    let grid = [], opened = [], flagged = [], targetPos = { r: 0, c: 0 };
    let gameActive = false, totalSeconds = 0, hintDuration = 4000, mainTimer, currentMode = "";

    const overlay = document.getElementById('scan-overlay');
    const loginScreen = document.getElementById('login-screen');
    const gameContainer = document.getElementById('game-container');
    const passInput = document.getElementById('pass-input');
    const resultScreen = document.getElementById('result-screen');
    const resultTitle = document.getElementById('result-title');
    const resultMsg = document.getElementById('result-msg');

    // 스캔 마스크 제어
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);

    function handleMove(e) {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        if (!x || !y) return;
        overlay.style.setProperty('--mask-x', `${x}px`);
        overlay.style.setProperty('--mask-y', `${y}px`);
        document.querySelectorAll('.hidden-hint').forEach(hint => {
            const rect = hint.getBoundingClientRect();
            if (Math.sqrt(Math.pow(x-(rect.left+rect.width/2),2) + Math.pow(y-(rect.top+rect.height/2),2)) < 100) hint.classList.add('scanned');
            else hint.classList.remove('scanned');
        });
    }

    passInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = passInput.value.toUpperCase();
            if (val === 'ZHOU12') initGame("ZHOU JIN", 180, 8000, "EASY");
            else if (val === 'BRAIN9') initGame("ZHANG HAN-SUNG", 120, 4000, "NORMAL");
            else if (val === 'BOSS00') initGame("THE BOSS", 120, 1500, "BOSS");
            else { passInput.value = ""; }
        }
    });

    function initGame(name, time, hTime, mode) {
        gameActive = true; totalSeconds = time; hintDuration = hTime; currentMode = mode;
        loginScreen.style.display = 'none'; overlay.style.display = 'none';
        document.getElementById('hint-container').style.display = 'none';
        gameContainer.style.display = 'block';
        document.getElementById('agent-name').innerText = name;
        if(mode === "BOSS") document.getElementById('target-goal').innerText = "CLEAN ALL";
        setupBoard();
        startTimer();
    }

    function setupBoard() {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        opened = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        flagged = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        let tSet = false, mSet = 0;
        while (!tSet || mSet < MINES - 1) {
            let r = Math.floor(Math.random()*ROWS), c = Math.floor(Math.random()*COLS);
            if (grid[r][c] === 0) {
                if (!tSet) { targetPos = {r, c}; grid[r][c] = 'T'; tSet = true; }
                else { grid[r][c] = 'M'; mSet++; }
            }
        }
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if (grid[r][c] === 'M' || grid[r][c] === 'T') continue;
                let count = 0;
                for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) {
                    let nr = r+i, nc = c+j;
                    if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && (grid[nr][nc]==='M'||grid[nr][nc]==='T')) count++;
                }
                grid[r][c] = count;
            }
        }
        renderBoard();
    }

    function renderBoard() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
            const div = document.createElement('div');
            div.className = 'tile'; div.id = `t-${r}-${c}`;
            div.onclick = () => handleClick(r, c);
            div.oncontextmenu = (e) => { e.preventDefault(); handleRightClick(r, c); };
            gridEl.appendChild(div);
        }
    }

    function handleClick(r, c) {
        if (!gameActive || opened[r][c] || flagged[r][c]) return;
        if (currentMode === "BOSS") {
            if (grid[r][c] === 'M' || grid[r][c] === 'T') showResult(false, "AGENT EXPOSED", "조직원에게 정체가 발각되었습니다. 작전 실패.");
            else { reveal(r, c); checkWin(); }
        } else {
            if (grid[r][c] === 'T') showResult(true, "MISSION COMPLETE", "장청을 성공적으로 확보했습니다. 추출 지점으로 이동하십시오.");
            else if (grid[r][c] === 'M') showResult(false, "AGENT EXPOSED", "조직원에게 정체가 노출되었습니다. 시스템을 강제 종료합니다.");
            else reveal(r, c);
        }
    }

    function handleRightClick(r, c) {
        if (!gameActive || opened[r][c]) return;
        flagged[r][c] = !flagged[r][c];
        document.getElementById(`t-${r}-${c}`).innerText = flagged[r][c] ? "🚩" : "";
        if (currentMode === "BOSS") checkWin();
    }

    function reveal(r, c) {
        if (r<0 || r>=ROWS || c<0 || c>=COLS || opened[r][c] || flagged[r][c]) return;
        opened[r][c] = true;
        const el = document.getElementById(`t-${r}-${c}`);
        el.classList.add('open');
        if (grid[r][c] > 0) el.innerText = grid[r][c];
        const dist = Math.sqrt(Math.pow(r-targetPos.r, 2) + Math.pow(c-targetPos.c, 2));
        let cls = dist <= 2.2 ? 'hint-red' : (dist <= 4.2 ? 'hint-orange' : 'hint-blue');
        el.classList.add(cls);
        setTimeout(() => { el.classList.remove('hint-red', 'hint-orange', 'hint-blue'); el.classList.add('hint-none'); }, hintDuration);
        if (grid[r][c] === 0) {
            for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) reveal(r+i, c+j);
        }
    }

    function checkWin() {
        if (currentMode !== "BOSS") return;
        let win = true;
        for (let r=0; r<ROWS; r++) {
            for (let c=0; c<COLS; c++) {
                if ((grid[r][c] === 'M' || grid[r][c] === 'T') && !flagged[r][c]) win = false;
                if (typeof grid[r][c] === 'number' && !opened[r][c]) win = false;
            }
        }
        if (win) showResult(true, "CLEAN SWEEP", "모든 위험 요소를 제거했습니다. 보스 모드 클리어.");
    }

    function startTimer() {
        mainTimer = setInterval(() => {
            totalSeconds--;
            const m = Math.floor(totalSeconds/60), s = totalSeconds%60;
            const display = document.getElementById('global-timer');
            display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (totalSeconds <= 15) display.classList.add('timer-red');
            if (totalSeconds <= 0) showResult(false, "SIGNAL LOST", "제한 시간이 초과되었습니다. 통신이 두절되었습니다.");
        }, 1000);
    }

    function showResult(isSuccess, title, msg) {
        gameActive = false;
        clearInterval(mainTimer);
        resultScreen.style.display = 'flex';
        resultTitle.innerText = title;
        resultTitle.className = isSuccess ? 'success' : 'failure';
        resultMsg.innerText = msg;
    }
</script>
</body>
</html>
