<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강철삼림: 언더커버 추출 작전</title>
    <style>
        :root {
            --bg-dark: #050a0f;
            --panel-bg: #0d151d;
            --accent-blue: #00e5ff;
            --danger-red: #ff3e3e;
            --signal-green: #00ff88;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* CCTV 스캔라인 효과 */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 1px solid #2a3b4d;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3b4d;
            padding-bottom: 10px;
        }

        .status-panel { text-align: center; }
        .timer { font-size: 2rem; color: var(--accent-blue); }

        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            background: #16222c;
            border: 1px solid #253341;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tile:hover { background: #1f2f3d; }
        .tile.open { background: #050a0f; cursor: default; }
        
        /* 신호 상태에 따른 히트맵 클래스 */
        .hint-red { color: var(--danger-red); text-shadow: 0 0 5px var(--danger-red); }
        .hint-orange { color: #ffab40; }
        .hint-blue { color: var(--accent-blue); }
        .hint-none { color: #444; }

        .system-log {
            background: #000;
            padding: 10px;
            font-size: 0.8rem;
            color: var(--signal-green);
            height: 40px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="profile">AGENT<br><span style="color:var(--accent-blue)">ZHOU JIN</span></div>
        <div class="status-panel">
            <div id="status-text">TRACKING SIGNAL...</div>
            <div class="timer" id="timer">20s</div>
        </div>
        <div class="profile">TARGET<br><span style="color:var(--danger-red)">JANG CHENG</span></div>
    </header>

    <div id="grid"></div>

    <div class="system-log" id="log">
        [SYSTEM] 초기화 완료. 장청의 신호를 추적합니다...
    </div>
</div>

<script>
    const rows = 10, cols = 8, totalMines = 12;
    let gridData = [], opened = [];
    let jangCheng = { r: 0, c: 0 };
    let isPhaseActive = true;
    let timeLeft = 20;

    const gridEl = document.getElementById('grid');
    const timerEl = document.getElementById('timer');
    const logEl = document.getElementById('log');

    function initGame() {
        gridData = Array.from({ length: rows }, () => Array(cols).fill(0));
        opened = Array.from({ length: rows }, () => Array(cols).fill(false));
        
        // 장청 위치 (Target)
        jangCheng.r = Math.floor(Math.random() * rows);
        jangCheng.c = Math.floor(Math.random() * cols);
        gridData[jangCheng.r][jangCheng.c] = 'T';

        // 조직원 배치 (Mines)
        let placed = 0;
        while (placed < totalMines - 1) {
            let r = Math.floor(Math.random() * rows);
            let c = Math.floor(Math.random() * cols);
            if (gridData[r][c] === 0) {
                gridData[r][c] = 'M';
                placed++;
            }
        }

        // 주변 숫자 계산
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (gridData[r][c] !== 0) continue;
                let count = 0;
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        let nr = r + i, nc = c + j;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && 
                           (gridData[nr][nc] === 'M' || gridData[nr][nc] === 'T')) count++;
                    }
                }
                gridData[r][c] = count;
            }
        }
        renderGrid();
        startTimer();
    }

    function renderGrid() {
        gridEl.innerHTML = '';
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.r = r; tile.dataset.c = c;
                
                if (isPhaseActive) {
                    const dist = Math.sqrt(Math.pow(r - jangCheng.r, 2) + Math.pow(c - jangCheng.c, 2));
                    if (dist <= 2.5) tile.classList.add('hint-red');
                    else if (dist <= 4.5) tile.classList.add('hint-orange');
                    else tile.classList.add('hint-blue');
                    tile.innerText = gridData[r][c] === 'T' || gridData[r][c] === 'M' ? '!' : gridData[r][c];
                }

                tile.onclick = () => handleTap(r, c);
                gridEl.appendChild(tile);
            }
        }
    }

    function startTimer() {
        const timer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timer);
                isPhaseActive = false;
                document.getElementById('status-text').innerText = "SIGNAL LOST";
                document.getElementById('status-text').style.color = "var(--danger-red)";
                logEl.innerText = "[SYSTEM] 신호가 끊겼습니다. 마지막 위치를 기억하십시오.";
                renderGrid(); // 힌트 제거를 위한 재랜더링
            }
        }, 1000);
    }

    function handleTap(r, c) {
        if (opened[r][c]) return;
        opened[r][c] = true;
        const tile = gridEl.children[r * cols + c];
        tile.classList.add('open');
        tile.classList.remove('hint-red', 'hint-orange', 'hint-blue');

        if (gridData[r][c] === 'T') {
            alert("접선 성공! 장청을 추출했습니다.");
            location.reload();
        } else if (gridData[r][c] === 'M') {
            alert("작전 실패! 정체가 발각되었습니다.");
            location.reload();
        } else {
            tile.innerText = gridData[r][c];
        }
    }

    initGame();
</script>
</body>
</html>
